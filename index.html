<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Vault | Interview Intelligence</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  
  <style>
    :root {
      --bg-color: #05070a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(25px);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-blue: #3b82f6;
      --accent-purple: #8b5cf6;
      --star-gold: #fbbf24;
      --neon-glow: 0 0 20px rgba(59, 130, 246, 0.4);
      --radius-xl: 24px;
      --radius-m: 12px;
      --transition: all 0.2s ease;
      --sidebar-width: 280px;
    }

    body[data-theme="light"] {
      --bg-color: #f0f4f8;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --glass-border: rgba(0, 0, 0, 0.1);
      --text-main: #0f172a;
      --text-muted: #64748b;
      --accent-blue: #2563eb;
      --accent-purple: #7c3aed;
    }

    * { box-sizing: border-box; outline: none; }
    body {
      margin: 0; 
      font-family: 'Inter', system-ui, -apple-system, sans-serif; 
      color: var(--text-main);
      background-color: var(--bg-color);
      transition: background 0.3s ease;
    }

    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0;
      width: var(--sidebar-width);
      background: var(--bg-color);
      border-right: 1px solid var(--glass-border);
      padding: 30px 20px;
      z-index: 100;
      overflow-y: auto;
    }
    .main-content {
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      padding: 30px;
    }

    .bg-glow {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: -1; overflow: hidden;
    }
    .blob {
      position: absolute; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, rgba(0,0,0,0) 70%);
      border-radius: 50%; filter: blur(80px);
      animation: move 25s infinite alternate;
    }
    .blob-2 { background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, rgba(0,0,0,0) 70%); animation-delay: -12s; right: -10%; top: -10%; }
    @keyframes move { from { transform: translate(-10%, -10%) scale(1); } to { transform: translate(20%, 20%) scale(1.3); } }

    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-xl);
    }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; font-size: 22px; font-weight: 800; }
    .logo-mark { width: 32px; height: 32px; border-radius: 10px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); box-shadow: var(--neon-glow); }

    .nav-list { list-style: none; padding: 0; margin: 0; display: grid; gap: 8px; }
    .nav-btn {
      width: 100%; border: 0; background: transparent; display: flex; align-items: center; gap: 12px;
      padding: 12px 16px; border-radius: var(--radius-m); color: var(--text-muted); 
      font-weight: 500; cursor: pointer; transition: var(--transition);
    }
    .nav-btn:hover, .nav-btn.active { background: rgba(255,255,255,0.05); color: var(--text-main); transform: translateX(5px); }
    .nav-btn.active { border-left: 4px solid var(--accent-blue); background: linear-gradient(90deg, rgba(59,130,246,0.1), transparent); }

    .sidebar-group { border: 1px solid var(--glass-border); border-radius: var(--radius-m); background: rgba(0,0,0,0.2); overflow: hidden; margin-bottom: 12px; }
    .sidebar-group-toggle {
      width: 100%; padding: 12px; border: 0; background: transparent; color: var(--text-main);
      font-size: 11px; font-weight: 700; text-transform: uppercase; cursor: pointer; 
      display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-group-body { padding: 15px; display: grid; gap: 12px; }
    .collapsed .sidebar-group-body { display: none; }

    input, select, textarea {
      width: 100%; border: 1px solid var(--glass-border); border-radius: 8px; background: rgba(0,0,0,0.3);
      padding: 10px 12px; color: var(--text-main); transition: var(--transition);
    }
    body[data-theme="light"] select, body[data-theme="light"] input { background: #fff; color: #000; border: 1px solid #ccc; }

    .btn { 
      border-radius: 8px; padding: 10px 16px; font-weight: 600; cursor: pointer; 
      transition: var(--transition); border: 1px solid transparent;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary { background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); color: white; box-shadow: var(--neon-glow); }
    .btn-muted { background: rgba(255,255,255,0.05); color: var(--text-main); border: 1px solid var(--glass-border); }
    .btn-danger { background: #ef4444; color: white; }

    .header {
      display: grid; grid-template-columns: 1fr auto auto; gap: 20px; align-items: center;
      padding: 15px 25px; margin-bottom: 24px;
    }

    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .kpi-card { padding: 24px; transition: var(--transition); cursor: pointer; }
    .kpi-card:hover { transform: translateY(-5px); border-color: var(--accent-blue); }
    .kpi-head { color: var(--text-muted); font-size: 13px; font-weight: 500; margin-bottom: 10px; }
    .kpi-value { font-size: 36px; font-weight: 800; }

    .table-wrap { overflow-x: auto; border-radius: var(--radius-xl); border: 1px solid var(--glass-border); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 800px; }
    th { padding: 15px; text-align: left; color: var(--text-muted); font-size: 11px; text-transform: uppercase; background: rgba(0,0,0,0.2); }
    td { padding: 15px; border-bottom: 1px solid var(--glass-border); font-size: 14px; }

    .badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; background: var(--accent-blue); color: white; }
    
    .star-btn { 
      background: none !important; border: none !important; cursor: pointer; 
      font-size: 20px; transition: var(--transition); color: var(--text-muted); padding: 0 10px;
    }
    .star-active { color: var(--star-gold) !important; text-shadow: 0 0 10px rgba(251, 191, 36, 0.8); }

    .mobile-menu-btn {
      display: none; position: fixed; bottom: 25px; right: 25px; 
      width: 60px; height: 60px; border-radius: 50%; 
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); 
      color: white; border: none; font-size: 24px; z-index: 1000; cursor: pointer;
    }

    .dist-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .dist-card {
      padding: 20px; transition: var(--transition); cursor: pointer;
      border: 1px solid var(--glass-border); position: relative; overflow: hidden;
    }
    .dist-card:hover { transform: scale(1.02); border-color: var(--accent-blue); background: rgba(255,255,255,0.05); }
    .progress-container { height: 8px; background: rgba(0,0,0,0.3); border-radius: 4px; overflow: hidden; margin-top: 10px; }
    .progress-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

    .topic-group-header {
      background: linear-gradient(90deg, var(--accent-blue), transparent);
      padding: 12px 20px; border-radius: var(--radius-m); margin: 30px 0 10px 0;
      display: flex; justify-content: space-between; align-items: center;
      color: white; font-weight: 700; border-left: 5px solid var(--accent-purple);
    }
    body[data-theme="light"] .topic-group-header { background: linear-gradient(90deg, #dbeafe, transparent); color: var(--text-main); }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .main-content { margin-left: 0; }
      .mobile-menu-btn { display: flex; align-items: center; justify-content: center; }
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body data-theme="dark">
  <div class="bg-glow"><div class="blob"></div><div class="blob blob-2"></div></div>
  <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>

  <aside class="sidebar" id="mainSidebar">
    <div class="logo"><div class="logo-mark"></div><span>QA Vault</span></div>
    <ul class="nav-list">
      <li><button class="nav-btn active" data-view="dashboard">📊 Dashboard</button></li>
      <li><button class="nav-btn" data-view="tracker">📝 Registry</button></li>
      <li><button class="nav-btn" data-view="trends">🔥 Analysis</button></li>
      <li><button class="nav-btn" data-view="readiness">🎯 Readiness</button></li>
      <li><button class="nav-btn" data-view="settings">⚙️ Config</button></li>
    </ul>
    <div class="sidebar-tools">
      <div class="sidebar-group" data-group="intake">
        <button class="sidebar-group-toggle" data-group-toggle="intake">Ingestion <span>▾</span></button>
        <div class="sidebar-group-body">
          <textarea id="questionInput" placeholder="Paste raw text..."></textarea>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
            <button id="segregateBtn" class="btn btn-primary">Segregate</button>
            <button id="sampleBtn" class="btn btn-muted">Sample</button>
          </div>
        </div>
      </div>
      <div class="sidebar-group" data-group="imports">
        <button class="sidebar-group-toggle" data-group-toggle="imports">LinkedIn Sync <span>▾</span></button>
        <div class="sidebar-group-body">
          <input id="linkedinUrl" type="url" placeholder="LinkedIn URL...">
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
            <button id="fetchLinkedinBtn" class="btn btn-muted">Fetch</button>
            <button id="extractLinkedinBtn" class="btn btn-primary">Extract</button>
          </div>
          <textarea id="linkedinText" style="margin-top:10px;" placeholder="Paste post text..."></textarea>
        </div>
      </div>
    </div>
  </aside>

  <main class="main-content">
    <header class="header glass-panel">
      <input id="searchInput" type="search" placeholder="Query the vault...">
      <button class="btn btn-muted" id="themeToggleBtn">🌓</button>
      <div class="profile glass-panel" style="padding: 5px 15px; display:flex; align-items:center; gap:10px;">
        <div class="logo-mark" style="width:20px; height:20px;"></div>
        <strong style="font-size:12px;">QA Vault User</strong>
      </div>
    </header>

    <div id="view-dashboard" class="app-view">
      <div class="grid-4">
        <div class="kpi-card glass-panel"><div class="kpi-head">Total Questions</div><div class="kpi-value" id="totalQuestions">0</div></div>
        <div class="kpi-card glass-panel"><div class="kpi-head">Mastered</div><div class="kpi-value" id="readyQuestions">0</div></div>
        <div class="kpi-card glass-panel"><div class="kpi-head">High Priority</div><div class="kpi-value" id="highPriority">0</div></div>
        <div class="kpi-card glass-panel"><div class="kpi-head">Readiness Score</div><div class="kpi-value" id="readinessScore">0%</div></div>
      </div>
      <div class="glass-panel" style="margin-top:24px; padding:30px; background: linear-gradient(135deg, rgba(59,130,246,0.1), rgba(139,92,246,0.1)); border: 1px solid var(--accent-blue);">
        <h2 style="margin-top:0;">Strategic Recommendation</h2>
        <p id="nextAction">Analyzing vault data for optimal study path...</p>
        <button id="viewQuestionsBtn" class="btn btn-primary" style="margin-top:10px;">Open Registry</button>
      </div>
    </div>

    <div id="view-tracker" class="app-view" style="display:none;">
      <div class="section glass-panel" style="padding:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
          <h2 style="margin:0;">Intelligence Registry</h2>
          <div style="display:flex; gap:10px;">
            <button id="exportCsvBtn" class="btn btn-muted">📄 CSV</button>
            <button id="exportPdfBtn" class="btn btn-muted">📕 PDF</button>
            <button id="clearFilterBtn" class="btn btn-muted">Clear Filter</button>
          </div>
        </div>
        <div id="registryContent"></div>
        <div id="trackerEmpty" style="text-align:center; padding:40px; color:var(--text-muted);">Vault is empty.</div>
      </div>
    </div>

    <div id="view-trends" class="app-view" style="display:none;">
      <div class="section glass-panel" style="padding:20px;">
        <h2 style="margin-bottom:20px;">Knowledge Distribution Map</h2>
        <div id="distGrid" class="dist-grid"></div>
      </div>
    </div>

    <div id="view-readiness" class="app-view" style="display:none;">
      <div class="section glass-panel" style="padding:20px; text-align:center;">
        <h2 style="margin-bottom:20px;">Performance Metrics</h2>
        <div id="readinessRing" style="width:200px; height:200px; border-radius:50%; margin: 0 auto; display:grid; place-items:center; background: conic-gradient(var(--accent-blue) 0deg, #1e293b 0deg);">
          <div style="width:160px; height:160px; background: var(--bg-color); border-radius:50%; display:grid; place-items:center; border: 1px solid var(--glass-border);">
            <strong id="readinessPercent" style="font-size:32px;">0%</strong>
          </div>
        </div>
      </div>
    </div>

    <div id="view-settings" class="app-view" style="display:none;">
      <div class="section glass-panel" style="padding:20px;">
        <h2 style="margin-bottom:20px;">Vault Configuration</h2>
        <div class="grid-4" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
          <div style="display:flex; flex-direction:column; gap:5px;"><label>Target Role</label><input id="targetRole"></div>
          <div style="display:flex; flex-direction:column; gap:5px;"><label>Target Company</label><input id="targetCompany"></div>
          <div style="display:flex; flex-direction:column; gap:5px;"><label>Date</label><input id="interviewDate" type="date"></div>
          <div style="display:flex; flex-direction:column; gap:5px;"><label>Level</label><select id="experienceLevel">
            <option value="fresher">Fresher</option><option value="mid">Mid</option><option value="senior">Senior</option>
          </select></div>
        </div>
      </div>
    </div>

    <div class="glass-panel" style="margin-top:20px; padding:20px;">
      <h3 style="margin-top:0;">Activity Stream</h3>
      <div id="activityFeed" style="display:grid; gap:10px;"></div>
    </div>
  </main>

  <script>
    const STORAGE_KEY = "qaVault_State_v3"; 
    const OLD_STORAGE_KEY = "qaInterviewIntelligenceStateV2"; 
    const THEME_KEY = "qaVault_Theme_v3";

    const categories = [
      { id: "selenium", title: "Selenium", difficulty: "Medium", keywords: ["selenium", "webdriver", "xpath", "stale", "wait"] },
      { id: "playwright", title: "Playwright", difficulty: "Medium", keywords: ["playwright", "trace", "locator", "fixture"] },
      { id: "api", title: "API Testing", difficulty: "High", keywords: ["api", "rest", "postman", "json", "status code", "schema"] },
      { id: "framework", title: "Framework", difficulty: "High", keywords: ["pom", "framework", "design pattern", "hybrid"] },
      { id: "manual", title: "Manual", difficulty: "Low", keywords: ["manual", "test case", "smoke", "sanity", "regression"] },
      { id: "other", title: "General", difficulty: "Low", keywords: [] }
    ];

    const els = {
      questionInput: document.getElementById("questionInput"),
      segregateBtn: document.getElementById("segregateBtn"),
      sampleBtn: document.getElementById("sampleBtn"),
      linkedinUrl: document.getElementById("linkedinUrl"),
      fetchLinkedinBtn: document.getElementById("fetchLinkedinBtn"),
      extractLinkedinBtn: document.getElementById("extractLinkedinBtn"),
      linkedinText: document.getElementById("linkedinText"),
      searchInput: document.getElementById("searchInput"),
      totalQuestions: document.getElementById("totalQuestions"),
      readyQuestions: document.getElementById("readyQuestions"),
      highPriority: document.getElementById("highPriority"),
      readinessScore: document.getElementById("readinessScore"),
      readinessPercent: document.getElementById("readinessPercent"),
      readinessRing: document.getElementById("readinessRing"),
      nextAction: document.getElementById("nextAction"),
      viewQuestionsBtn: document.getElementById("viewQuestionsBtn"),
      distGrid: document.getElementById("distGrid"),
      registryContent: document.getElementById("registryContent"),
      trackerEmpty: document.getElementById("trackerEmpty"),
      activityFeed: document.getElementById("activityFeed"),
      themeToggleBtn: document.getElementById("themeToggleBtn"),
      mobileMenuBtn: document.getElementById("mobileMenuBtn"),
      mainSidebar: document.getElementById("mainSidebar"),
      clearFilterBtn: document.getElementById("clearFilterBtn"),
      exportCsvBtn: document.getElementById("exportCsvBtn"),
      exportPdfBtn: document.getElementById("exportPdfBtn")
    };

    let state = { records: [], query: "", activeFilter: "all", target: {}, activity: [] };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

    function load() { 
      const currentData = localStorage.getItem(STORAGE_KEY);
      const oldData = localStorage.getItem(OLD_STORAGE_KEY);
      if (currentData) { state = JSON.parse(currentData); } 
      else if (oldData) {
        const parsedOld = JSON.parse(oldData);
        state.records = parsedOld.records || [];
        state.target = parsedOld.target || {};
        state.activity = parsedOld.activity || [];
        save();
      }
    }

    function pushActivity(msg) {
      state.activity.unshift({ msg, time: new Date().toLocaleTimeString() });
      state.activity = state.activity.slice(0, 5);
      render();
    }

    function classify(q) {
      const text = q.toLowerCase();
      for(let c of categories) if(c.keywords.some(k => text.includes(k))) return c.id;
      return "other";
    }

    function addQuestions(list) {
      list.forEach(q => {
        const id = Date.now() + Math.random();
        state.records.push({ id, question: q, categoryId: classify(q), status: "new", starred: false, reviewedAt: new Date().toISOString() });
      });
      save(); pushActivity(`Added ${list.length} questions`);
    }

    // CORE FIXES: Pass ID as string and use Array.map
    function toggleStar(id) {
      state.records = state.records.map(r => r.id == id ? {...r, starred: !r.starred} : r);
      save(); render();
    }

    function updateStatus(id, val) {
      state.records = state.records.map(r => r.id == id ? {...r, status: val} : r);
      save(); render();
    }

window.removeQ = function(id) {
    console.log("Delete button clicked for ID:", id); // This lets you check the console
    
    // Force both to strings to avoid ANY type mismatch
    const targetId = String(id);
    
    const initialCount = state.records.length;
    state.records = state.records.filter(r => String(r.id) !== targetId);
    
    if (state.records.length < initialCount) {
        console.log("Item successfully removed from state.");
        save();   // Save to local storage
        render(); // Update the screen
    } else {
        console.error("Item not found. Check if ID exists in state.");
    }
};

    function exportCSV() {
      if(!state.records.length) return alert("No data");
      let csv = "Question,Topic,Difficulty,Status\n";
      state.records.forEach(r => {
        const cat = categories.find(c => c.id === r.categoryId) || categories[5];
        csv += `"${r.question}","${cat.title}","${cat.difficulty}","${r.status}"\n`;
      });
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'QA_Vault_Intelligence.csv'; a.click();
      pushActivity("Exported CSV Report");
    }

    async function exportPDF() {
      if(!state.records.length) return alert("No data");
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.text("QA Vault | Intelligence Registry", 14, 15);
      const rows = state.records.map(r => {
        const cat = categories.find(c => c.id === r.categoryId) || categories[5];
        return [r.question, cat.title, cat.difficulty, r.status];
      });
      doc.autoTable({ head: [['Question', 'Topic', 'Difficulty', 'Status']], body: rows, startY: 20, theme: 'grid' });
      doc.save('QA_Vault_Intelligence.pdf');
      pushActivity("Exported PDF Report");
    }

    function renderDistribution() {
      els.distGrid.innerHTML = categories.map(cat => {
        const qns = state.records.filter(r => r.categoryId === cat.id);
        const ready = qns.filter(r => r.status === 'ready').length;
        const percent = qns.length ? Math.round((ready / qns.length) * 100) : 0;
        let color = percent < 30 ? '#ef4444' : (percent < 70 ? '#fbbf24' : 'var(--accent-blue)');
        return `<div class="dist-card glass-panel" onclick="filterByTopic('${cat.id}')">
          <div class="dist-header" style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <strong>${cat.title}</strong><span style="opacity:0.6; font-size:12px;">${qns.length} Qns</span>
          </div>
          <div style="font-size:24px; font-weight:800;">${percent}% <span style="font-size:14px; font-weight:400; color:var(--text-muted);">Mastery</span></div>
          <div class="progress-container"><div class="progress-bar" style="width:${percent}%; background:${color};"></div></div>
        </div>`;
      }).join("");
    }

    function filterByTopic(topicId) {
      state.activeFilter = topicId;
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-view="tracker"]').classList.add('active');
      document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
      document.getElementById('view-tracker').style.display = 'block';
      render();
    }

    function render() {
      const filtered = state.records.filter(r => {
        const matchesQuery = r.question.toLowerCase().includes(state.query);
        const matchesTopic = state.activeFilter === "all" || r.categoryId === state.activeFilter;
        return matchesQuery && matchesTopic;
      });
      
      els.totalQuestions.textContent = state.records.length;
      els.readyQuestions.textContent = state.records.filter(r => r.status === 'ready').length;
      const rp = state.records.length ? Math.round((state.records.filter(r => r.status === 'ready').length / state.records.length) * 100) : 0;
      els.readinessScore.textContent = rp + "%";
      els.readinessPercent.textContent = rp + "%";
      els.readinessRing.style.background = `conic-gradient(var(--accent-blue) 0deg, #1e293 la-background ${rp * 3.6}deg)`;

      let registryHtml = "";
      const groups = categories.filter(cat => filtered.some(r => r.categoryId === cat.id));

      groups.forEach(cat => {
        const catQns = filtered.filter(r => r.categoryId === cat.id);
        registryHtml += `
          <div class="topic-group-header"><span>${cat.title}</span><span style="font-size:12px; opacity:0.8;">${catQns.length} Questions</span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Question</th><th>Status</th><th>Actions</th></tr></thead>
              <tbody>
                ${catQns.map(r => `
                  <tr>
                    <td>${r.question}</td>
                    <td>
                      <select onchange="updateStatus(${r.id}, this.value)" style="background:transparent; color:var(--text-main); font-size:12px; border:1px solid var(--glass-border);">
                        <option value="new" ${r.status==='new'?'selected':''}>New</option>
                        <option value="studying" ${r.status==='studying'?'selected':''}>Studying</option>
                        <option value="ready" ${r.status==='ready'?'selected':''}>Ready</option>
                      </select>
                    </td>
                    <td>
                      <button class="star-btn ${r.starred?'star-active':''}" onclick="toggleStar(${r.id})">${r.starred?'★':'☆'}</button>
                      <button class="btn btn-danger" style="padding:2px 5px;" onclick="removeQ('${r.id}')">🗑</button>

                    </td>
                  </tr>`).join("")}
              </tbody>
            </table>
          </div>`;
      });

      els.registryContent.innerHTML = registryHtml;
      els.trackerEmpty.style.display = filtered.length ? "none" : "block";
      els.activityFeed.innerHTML = state.activity.map(a => `<div class="glass-panel" style="padding:10px; font-size:12px; display:flex; justify-content:space-between;"><span>${a.msg}</span><span style="opacity:0.5">${a.time}</span></div>`).join("");
      renderDistribution();
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
        document.getElementById(`view-${btn.dataset.view}`).style.display = 'block';
        state.activeFilter = "all";
        els.mainSidebar.classList.remove('open');
        render();
      });
    });

    els.segregateBtn.addEventListener("click", () => {
      const text = els.questionInput.value;
      const qs = text.split('\n').filter(l => l.trim().length > 10);
      addQuestions(qs);
      els.questionInput.value = "";
    });

    els.sampleBtn.addEventListener("click", () => {
      els.questionInput.value = "How to handle stale element exception?\nWhat is Page Object Model?\nHow to perform API testing in Selenium?";
      els.segregateBtn.click();
    });

    els.exportCsvBtn.addEventListener("click", exportCSV);
    els.exportPdfBtn.addEventListener("click", exportPDF);
    els.themeToggleBtn.addEventListener("click", () => {
      const theme = document.body.getAttribute("data-theme") === "dark" ? "light" : "dark";
      document.body.setAttribute("data-theme", theme);
      localStorage.setItem(THEME_KEY, theme);
    });

    els.mobileMenuBtn.addEventListener("click", () => els.mainSidebar.classList.toggle("open"));
    els.searchInput.addEventListener("input", e => { state.query = e.target.value.toLowerCase(); render(); });
    els.viewQuestionsBtn.addEventListener("click", () => { document.querySelector('[data-view="tracker"]').click(); });
    els.clearFilterBtn.addEventListener("click", () => { state.activeFilter = "all"; render(); });

    load();
    document.body.setAttribute("data-theme", localStorage.getItem(THEME_KEY) || "dark");
    render();
  </script>
</body>
</html>
